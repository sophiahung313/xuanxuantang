<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>祖师圣诞供奉报名</title>
  <style>
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
           background: #fdf6ec; color: #3d2b1f; margin: 0; padding: 0; }
    .banner {
      background: linear-gradient(135deg, #8b0000, #c0392b);
      color: #fff; text-align: center; padding: 30px 20px 20px;
    }
    .banner h1 { font-size: 22px; margin: 0 0 10px; font-weight: bold; }
    .banner p  { font-size: 14px; margin: 6px 0; line-height: 1.7; }
    .banner .date { font-size: 13px; color: #ffdab9; margin-top: 12px; }
    .container { max-width: 560px; margin: 24px auto; padding: 0 16px 60px; }
    .section-title {
      background: linear-gradient(90deg, #c0392b, #e74c3c);
      color: #fff; font-size: 16px; padding: 10px 18px;
      border-radius: 8px 8px 0 0; font-weight: bold;
    }
    .form-box {
      background: #fff; border: 1px solid #e8cba0;
      border-top: none; border-radius: 0 0 12px 12px;
      padding: 24px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 15px; font-weight: bold;
      color: #8b0000; margin-bottom: 6px;
    }
    .field .hint { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    input[type="text"], textarea {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      font-size: 15px; border: 1.5px solid #e0c89a;
      border-radius: 8px; background: #fffef8;
      color: #3d2b1f; outline: none; resize: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #c0392b; }
    .submit-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #8b0000, #c0392b);
      color: #fff; border: none; border-radius: 30px;
      font-size: 17px; font-weight: bold; cursor: pointer;
      letter-spacing: 2px; margin-top: 8px; box-shadow: 0 4px 12px rgba(139,0,0,0.3);
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-box {
      display: none; background: #fff; border: 2px solid #27ae60;
      border-radius: 16px; padding: 32px 24px; text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .success-box .icon { font-size: 52px; line-height: 1; margin-bottom: 16px; }
    .success-box h2 { color: #27ae60; font-size: 20px; margin: 0 0 16px; }
    .success-box .info {
      background: #f0fdf4; border-radius: 10px; padding: 16px;
      text-align: left; font-size: 15px; line-height: 2;
    }
    .success-box .info strong { color: #8b0000; }
    .success-box .footer-verse {
      margin-top: 20px; font-size: 14px; color: #aaa;
      font-style: italic; line-height: 1.7;
    }
    .loading {
      display: none; text-align: center; padding: 40px;
      font-size: 16px; color: #c0392b;
    }
    @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
    .loading::after { content: '...'; animation: dots 1.2s infinite; }
  </style>
</head>
<body>

<div class="banner">
  <h1>三月初三 · 祖师圣诞供奉</h1>
  <p>北极镇天真武玄天荡魔大祖师圣诞</p>
  <p>定于4月19日（农历三月初三）玄玄堂法坛顶礼供奉</p>
  <p>感恩祖师慈悲加持，愿国泰民安、民族复兴、阖家幸福安康！</p>
  <p class="date">供灯供奉祈福，一切费用全免</p>
</div>

<div class="container">
  <div class="section-title">📋 报名填写</div>
  <div class="form-box" id="formBox">
    <div class="field">
      <label>姓名 *</label>
      <input type="text" id="f-name" placeholder="如：张三 合家" maxlength="50" />
    </div>
    <div class="field">
      <label>地址 *</label>
      <div class="hint">请填写详细地址，精确到街道/小区/门牌号</div>
      <textarea id="f-address" rows="3" placeholder="如：广东省广州市天河区天河路123号天河花园X栋XXX室" maxlength="150"></textarea>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="doSubmit()">提 交 报 名</button>
  </div>

  <div class="loading" id="loading">提交中</div>

  <div class="success-box" id="successBox">
    <div class="icon">🙏</div>
    <h2>报名成功</h2>
    <div class="info">
      <div><strong>姓名：</strong><span id="s-name"></span></div>
      <div><strong>地址：</strong><span id="s-address"></span></div>
      <div><strong>时间：</strong><span id="s-time"></span></div>
    </div>
    <div class="footer-verse">
      禀得真心一颗，迎千福祛万灾。<br/>
      祖师庇佑，福至心灵，万事顺遂！
    </div>
  </div>
</div>

<script>
(function() {
  var ENV_ID     = 'xuanxuantang313-6gmtsyqaa7026f6b';
  var FILE_PATH  = 'data/signups.json';  // 云存储里的文件名

  function fmtTime() {
    var d = new Date();
    var p = function(n){ return String(n).padStart(2,'0'); };
    return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  }

  function getStorageUrl() {
    return 'https://' + ENV_ID + '.tcloudbaseapp.com/signups.json';
  }

  function getMetaUrl() {
    return 'https://' + ENV_ID + '.tcloudbaseapp.com/meta.json';
  }

  function genId() {
    return Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,6);
  }

  function fmtLocalTime() {
    var d = new Date();
    var p = function(n){ return String(n).padStart(2,'0'); };
    return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
  }

  window.doSubmit = async function() {
    var name    = document.getElementById('f-name').value.trim();
    var address = document.getElementById('f-address').value.trim();
    if (!name)    { alert('请填写姓名'); return; }
    if (!address) { alert('请填写地址'); return; }
    if (address.length < 10) {
      alert('地址请填写详细，精确到街道或门牌号，谢谢 🙏'); return;
    }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('formBox').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    var record = {
      id:        genId(),
      name:      name,
      address:   address,
      createdAt: fmtLocalTime(),
      ts:        Date.now()
    };

    // 读取现有数据
    var existing = [];
    try {
      var r = await fetch(getStorageUrl(), { method: 'GET' });
      if (r.ok) {
        var txt = await r.text();
        if (txt) existing = JSON.parse(txt);
      }
    } catch(e) { /* 新文件，忽略 */ }

    existing.push(record);

    // 写回云存储
    try {
      var uploadResp = await fetch(getStorageUrl(), {
        method: 'PUT',
        body: JSON.stringify(existing),
        headers: { 'Content-Type': 'application/json' }
      });
      console.log('上传结果:', uploadResp.status, uploadResp.statusText);
    } catch(e) {
      console.warn('云端写入失败:', e);
    }

    // 无论如何都显示成功（避免重复提交）
    document.getElementById('loading').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
    document.getElementById('s-name').textContent    = name;
    document.getElementById('s-address').textContent = address;
    document.getElementById('s-time').textContent    = fmtTime();
  };
})();
</script>
</body>
</html>
